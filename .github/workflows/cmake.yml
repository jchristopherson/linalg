name: CMake

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  BUILD_TYPE: Release

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / shared=${{ matrix.shared }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            version: '14'
            shared: false
          - os: ubuntu-latest
            compiler: intel
            version: '2023.2'
            shared: true
          - os: macos-latest
            compiler: gcc
            version: '14'
            shared: false
          - os: macos-latest
            compiler: gcc
            version: '14'
            shared: true
          - os: windows-latest
            compiler: gcc
            version: '14'
            shared: false
          - os: windows-latest
            compiler: intel
            version: '2023.2'
            shared: true

    steps:
      - uses: actions/checkout@v4

      - uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: ${{ matrix.compiler }}
          version: ${{ matrix.version }}

      - name: Show Fortran compiler version
        run: ${{ env.FC }} --version
        env:
          FC: ${{ steps.setup-fortran.outputs.fc }}
          CC: ${{ steps.setup-fortran.outputs.cc }}

      - name: Configure CMake
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_Fortran_COMPILER=${{ env.FC }}
          -DCMAKE_C_COMPILER=${{ env.CC }}
          -DBUILD_TESTING=TRUE
          -DBUILD_LINALG_C_API=TRUE
          -DBUILD_SHARED_LIBS=${{ matrix.shared && 'TRUE' || 'FALSE' }}
        env:
          FC: ${{ steps.setup-fortran.outputs.fc }}
          CC: ${{ steps.setup-fortran.outputs.cc }}

      - name: Build with CMake
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Test with CMake
        working-directory: build
        run: ctest --output-on-failure -C ${{ env.BUILD_TYPE }}

      - name: Install with CMake
        run: cmake --install build --prefix ${{ github.workspace }}/install --config ${{ env.BUILD_TYPE }}